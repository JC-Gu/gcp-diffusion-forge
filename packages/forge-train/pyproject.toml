[project]
name = "forge-train"
version = "0.1.0"
description = "Training loops: accelerate wrappers, LoRA/DoRA fine-tuning, FSDP2 multi-node"
requires-python = ">=3.11,<3.13"
dependencies = [
    "forge-core",
]

# Heavy training deps added when implementing training module:
# diffusers>=0.32, transformers>=4.47, accelerate>=1.2, peft>=0.14,
# safetensors>=0.4.5, einops>=0.8, datasets>=3.2, wandb>=0.19

[project.optional-dependencies]
# Install with: uv sync --extra cuda
cuda = [
    # xformers>=0.0.28
    # bitsandbytes>=0.44
    # deepspeed>=0.16
    # flash-attn>=2.7  (requires CUDA toolkit, install separately)
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forge"]

[tool.uv.sources]
forge-core = { workspace = true }
