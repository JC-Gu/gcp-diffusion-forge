[project]
name = "forge-data"
version = "0.1.0"
description = "Data curation pipeline: download, embed, filter, caption"
requires-python = ">=3.11,<3.13"
dependencies = [
    "forge-core",
]

# Heavy data deps added when implementing each stage:
# img2dataset>=1.45, open_clip_torch>=2.28, webdataset>=0.2.86,
# datasets>=3.2, pyarrow>=18.0, pillow>=11.0

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forge"]

[tool.uv.sources]
forge-core = { workspace = true }
