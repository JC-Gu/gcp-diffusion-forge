[project]
name = "forge-serve"
version = "0.1.0"
description = "Serving stack: BentoML-based inference with OpenAI-compatible image generation API"
requires-python = ">=3.11,<3.13"
dependencies = [
    "forge-core",
]

# Heavy serving deps added when implementing serve module:
# bentoml>=1.3, diffusers>=0.32, transformers>=4.47,
# safetensors>=0.4.5, pillow>=11.0

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forge"]

[tool.uv.sources]
forge-core = { workspace = true }
