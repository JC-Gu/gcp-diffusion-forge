[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-cov>=6.0",
    "ruff>=0.9",
    "mypy>=1.13",
    "types-PyYAML>=6.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["B008", "SIM108"]

[tool.ruff.lint.isort]
known-first-party = ["forge"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
namespace_packages = true
explicit_package_bases = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
markers = [
    "cuda: requires NVIDIA GPU",
    "mps: requires Apple Silicon MPS",
    "slow: long-running tests, requires full model downloads",
]
